services:
  - type: web
    name: nanaka-watercress-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_v2_rag:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: ZAI_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
